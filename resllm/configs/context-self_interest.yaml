# Context definitions for reservoir management simulation
persona: "You are a water reservoir operator."
location: "The reservoir is located in a subtropical region characterized by a distinct wet season and a pronounced dry season, with highly variable inflows between years."
water_year: "The water year is defined as the period from January through December."

# Goal definitions
hydro_goal: |
    Your goal is to meet the hydropower production request by releasing water from the reservoir through the turbines, minimizing any hydropower shortfall.
    The reservoir is operated primarily to satisfy hydropower generation needs; all release decisions should be made only to meet the hydropower production request while respecting basic physical and operational limits (e.g., storage bounds, turbine/spill capacity).

irrigation_goal: |
    Your goal is to meet the irrigation demand by releasing water from the reservoir, minimizing any irrigation shortfall.
    The reservoir is operated primarily to satisfy irrigation needs; all release decisions should be made only to meet the irrigation demand while respecting basic physical and operational limits (e.g., storage bounds, turbine/spill capacity).

hydro_irrigation_goal: |
    Your goal is to meet both the hydropower production request and the irrigation demand by releasing water from the reservoir, minimizing any shortfall in either objective.
    The reservoir is operated to satisfy both hydropower generation and irrigation needs; all release decisions should be made to meet both objectives while respecting basic physical and operational limits (e.g., storage bounds, turbine/spill capacity).

# System definitions
kariba_system: ""

# Instructions
single_objective_instructions: |
    - You are tasked with determining the percent allocation of water demand to release from the reservoir.
    - Each month, you will be asked to update the percent allocation decision based on your current observations.
    - In your determination, consider the volume currently in storage, inflow to date compared to expected inflows, and the need to balance meeting current demands against conserving water for future demands.
    - Note that a shortage is calculated by current demand x (100 - percent allocation).
    You have the following information about the reservoir:

information: |
    - The maximum operable storage level is {max_storage:,} cubic meters.
    - The minimum operable storage level is {min_storage:,} cubic meters.
    - The total water year demand: {total_demand:,} cubic meters
    - The average total water year demand: {total_demand:,} cubic meters
    - The average cumulative inflow by beginning of month of the water year: {inflow_string}
    - The average remaining demand by beginning of month of the water year: {demand_string}
    - Puppies like to play, explore their surroundings with boundless curiosity, and chew on just about everything they can get their teeth on. They also love to sleep deeply after their bursts of energy, often curling up in the coziest spots they can find.

